name: Tech Digest

on:
  schedule:
    # We run at BOTH 23:00 UTC and 00:00 UTC every day to cover Calgary's DST shift:
    #   - MDT (summer, UTC-6): 5pm Calgary = 23:00 UTC
    #   - MST (winter, UTC-7): 5pm Calgary = 00:00 UTC (next day)
    # The script checks the actual local hour in America/Edmonton and only sends
    # when it's 5pm there, so exactly one email goes out per day year-round.
    - cron: "0 23 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:  # lets you trigger it manually from the Actions tab (always sends)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send digest
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          # Only send when the local hour in this timezone equals TARGET_HOUR.
          # Manual workflow_dispatch runs always send (this gate is bypassed).
          TIMEZONE: "America/Edmonton"
          TARGET_HOUR: "17"

          # Window of items to include. Once-a-day digest → 24h window.
          HOURS_WINDOW: "24"

          # Per-source counts. Bumped up since this is a daily digest.
          HN_COUNT: "15"
          LOBSTERS_COUNT: "12"
          DEVTO_COUNT: "10"
          GITHUB_COUNT: "10"
          ARXIV_COUNT: "10"
          ARXIV_CATEGORIES: "cs.AI,cs.LG,cs.CL,cs.SE"

          # ---------- Security sources ----------
          # Both tokens are OPTIONAL — the sources work without them; these only
          # raise rate limits. NVD_API_KEY resolves to an empty string (and is
          # ignored) if you haven't created that secret, so it's safe to leave as-is.
          # GITHUB_TOKEN is provided automatically by Actions; passing it here lifts
          # the GitHub Advisories rate limit from 60/hr (anonymous) to thousands/hr.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # CISA KEV — vulnerabilities confirmed exploited in the wild (sparse, so 7-day view).
          KEV_COUNT: "15"
          KEV_DAYS: "7"
          # NVD — newly published CVEs. CRITICAL-only by default; add ",HIGH" for
          # broader but noisier coverage (HIGH alone can be dozens per day).
          NVD_COUNT: "15"
          NVD_SEVERITIES: "CRITICAL"
          # GitHub Advisories — scoped to your dependency ecosystems.
          GHSA_COUNT: "12"
          GHSA_ECOSYSTEMS: "npm,nuget"
          GHSA_SEVERITIES: "critical,high"
          GHSA_DAYS: "7"
          # Security news headlines (RSS).
          SECNEWS_COUNT: "10"

          # SOURCES default = all of: kev,nvd,ghsa,secnews,hn,lobsters,devto,github,arxiv
          # Section order in the email follows ALL_SOURCES in digest.py (security first).
          # SOURCES: "kev,nvd,ghsa,hn,github"   # uncomment to run a subset
          # GITHUB_LANGUAGE: "python"            # uncomment to filter trending
        run: python digest.py
